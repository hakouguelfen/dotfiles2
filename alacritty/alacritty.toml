[window]
opacity = 0.9
blur = true

[window.padding]
x = 1
y = 0

[font]
size = 9

[font.normal]
# family = "FiraCodeNerdFont"
# family = "NotoSansTifinagh"
family = "JetBrainsMono"
style = "SemiBold"

[font.offset]
x = 0
y = 0

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
blink_interval = 750
thickness = 0.15
unfocused_hollow = false

[cursor.style]
blinking = "Never"
shape = "Underline"

